name: Levanta Daily Check

on:
  schedule:
    # 09:00 Asia/Shanghai = 01:00 UTC
    - cron: "0 1 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run Levanta check
        id: check
        continue-on-error: true
        env:
          LEVANTA_API_KEY: ${{ secrets.LEVANTA_API_KEY }}
        run: node ./cloud/run-and-record.mjs levanta-daily-check -- pwsh ./cloud/levanta-new-creators.ps1 -Source connections -StateDir ./levanta-state -OutputDir ./levanta-reports

      - name: Commit run evidence and state
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add automation-runs levanta-reports levanta-state
          git diff --cached --quiet || git commit -m "Archive Levanta daily check evidence"
          for i in 1 2 3; do
            git pull --rebase origin main
            git push && break
            sleep 5
          done

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: levanta-reports
          path: |
            levanta-reports/**
            levanta-state/**

      - name: Fail if Levanta check failed
        if: steps.check.outcome == 'failure'
        run: exit 1
