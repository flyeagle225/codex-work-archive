name: Feishu Morning Daily Reminder

on:
  schedule:
    # 10:00 Asia/Shanghai = 02:00 UTC
    - cron: "0 2 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  send-reminder:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Send reminder
        id: send
        continue-on-error: true
        env:
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
          FEISHU_RECEIVE_ID_TYPE: open_id
          FEISHU_RECEIVE_ID: ${{ secrets.FEISHU_MORNING_OPEN_ID }}
          LEVANTA_API_KEY: ${{ secrets.LEVANTA_API_KEY }}
        run: node ./cloud/run-and-record.mjs feishu-morning-daily-reminder -- node ./cloud/morning-workday-reminder.mjs

      - name: Commit run evidence
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add automation-runs boss-report-output
          git diff --cached --quiet || git commit -m "Archive morning reminder run evidence"
          for i in 1 2 3; do
            git pull --rebase origin main
            git push && break
            sleep 5
          done

      - name: Fail if reminder failed
        if: steps.send.outcome == 'failure'
        run: exit 1
