name: Feishu Task Close Reminders

on:
  schedule:
    # 2026-05-23 16:00 Asia/Shanghai
    - cron: "0 8 23 5 *"
    # 2026-05-29 17:00 Asia/Shanghai
    - cron: "0 9 29 5 *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  send-reminder:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Send reminder
        id: send
        continue-on-error: true
        env:
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
          FEISHU_RECEIVE_ID_TYPE: chat_id
          FEISHU_RECEIVE_ID: ${{ secrets.FEISHU_TASK_CHAT_ID }}
        run: node ./cloud/run-and-record.mjs feishu-task-close-reminders -- node ./cloud/task-close-reminder.mjs

      - name: Commit run evidence
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add automation-runs
          git diff --cached --quiet || git commit -m "Archive task close reminder run evidence"
          for i in 1 2 3; do
            git pull --rebase origin main
            git push && break
            sleep 5
          done

      - name: Fail if reminder failed
        if: steps.send.outcome == 'failure'
        run: exit 1
